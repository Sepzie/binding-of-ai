env:
  include_continuous_position_features: true
  frame_skip: 3
  max_episode_steps: 1000
  n_workers: 4
  base_port: 9999

reward:
  damage_dealt: 0.0
  enemy_killed: 0.0
  damage_taken: 0.0
  pickup_collected: 5.0
  room_cleared: 0.0
  death: -10.0
  time_penalty: -0.05
  survival_bonus: 0.0
  nav_progress_scale: 0.0
  nav_reach_bonus: 0.0
  wall_collision_penalty: -0.5

train:
  total_timesteps: 1000000
  learning_rate: 0.00005
  n_steps: 2048
  batch_size: 256
  n_epochs: 4
  clip_range: 0.1
  target_kl: 0.03
  ent_coef: 0.01

phase:
  enemy_type: 13
  enemy_variant: 0
  enemy_count: 0
  spawn_pickup_penny: true
  pickup_random_position: true
  pickup_offset_x: 100.0
  pickup_offset_y: 0.0
  pickup_radius_min: 120.0
  pickup_radius_max: 200.0
  terminal_on_pickup: false
  terminal_pickup_count: 0
  respawn_pickup: true
  spawn_enemies: false
  random_spawn_positions: false
  spawn_radius_min: 120.0
  spawn_radius_max: 200.0
  disable_shooting: true
  mask_shoot: true
  spawn_obstacles: true
  obstacle_count: 3
  obstacle_type: 4          # GRID_ROCKT (indestructible stone)
  obstacle_min_spacing: 2

wandb:
  enabled: true
  project: "binding-of-ai"
  run_name: "phase0d-obstacles-3rocks"
  tags: ["phase0d", "obstacles", "wall-penalty", "multicoin"]
